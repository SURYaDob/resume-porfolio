# fly.toml app configuration file for CDAC Enterprise
#
# How to deploy:
# 1. Install Fly.io CLI: https://fly.io/docs/hands-on/install-flyctl/
# 2. Run: flyctl auth login
# 3. Run: flyctl launch --copy-config
# 4. Set secrets:
#    flyctl secrets set DB_URL=jdbc:mysql://...
#    flyctl secrets set DB_USERNAME=...
#    flyctl secrets set DB_PASSWORD=...
#    flyctl secrets set JWT_SECRET=<random-secret>
#    flyctl secrets set JWT_EXPIRATION_MS=3600000
#    flyctl secrets set CORS_ALLOWED_ORIGINS=https://SURYaDob.github.io
#    flyctl secrets set SPRING_PROFILES_ACTIVE=prod
# 5. Run: flyctl deploy

app = "cdac-enterprise"
primary_region = "bom"  # Mumbai region for low latency (or use iad, fra, etc.)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Keep running on free tier
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 8080
  
  [[services.ports]]
    port = 80
    handlers = ["http"]
    
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[env]
  SPRING_PROFILES_ACTIVE = "prod"
