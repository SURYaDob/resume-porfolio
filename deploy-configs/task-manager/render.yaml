# Render Deployment Configuration
# Deploy Task Manager with H2 in-memory database (no external DB needed)
# 1. Push this file + Dockerfile to your repo
# 2. In Render Dashboard: New + Blueprint → Connect repo
#    OR: New Web Service → Docker → Point to repo
# 3. Set environment variables (optional):
#    SPRING_PROFILES_ACTIVE: prod

services:
  - type: web
    name: task-manager
    runtime: docker
    repo: https://github.com/SURYaDob/task-manager-springboot
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
