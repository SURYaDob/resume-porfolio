# ===========================================
# Production Profile - H2 In-Memory Database
# ===========================================
# Using H2 for Render free tier (no external DB needed)
# Data will reset when the service restarts (expected for demo)

spring.datasource.url=jdbc:h2:mem:taskmanager_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=true

# Server
server.port=8080
